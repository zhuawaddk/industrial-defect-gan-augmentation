# 集成配置 - 针对本地环境优化
data:
  dataset_path: "./datasets"  # 修改为相对路径
  image_size: 256
  batch_size: 8
  num_workers: 4
  train_split: 0.8
  augmentations:
    use: true
    horizontal_flip: 0.5
    rotation: 15
    brightness_contrast: 0.2

model:
  generator:
    latent_dim: 512
    style_dim: 512
    n_mlp: 8
    channel_multiplier: 2
    blur_kernel: [1, 3, 3, 1]
    lr: 0.0001
    beta1: 0.5
    beta2: 0.999

  discriminator:
    n_layers: 5
    channel_multiplier: 2
    n_scales: 3
    use_cbam: true
    lr: 0.0004
    beta1: 0.5
    beta2: 0.999

  attention:
    use_cbam: true
    reduction_ratio: 16

  adain:
    use: true
    eps: 1e-8

training:
  epochs: 100
  n_critic: 5
  lambda_gp: 10
  lambda_perceptual: 0.1
  lambda_reconstruction: 10
  lambda_lpips: 1.0
  save_interval: 10
  log_interval: 10
  checkpoint_dir: "./checkpoints"  # 保持与现有checkpoints目录一致

optuna:
  n_trials: 50
  timeout: 86400  # 24小时
  direction: "minimize"  # 最小化FID
  study_name: "focus_stylegan"
  storage: "sqlite:///optuna.db"

evaluation:
  metrics: ["fid", "is", "lpips", "psnr", "ssim", "pps"]
  n_samples: 5000
  batch_size: 32

augmentation:
  n_samples_per_class: 1000
  save_dir: "./outputs/augmented_datasets"